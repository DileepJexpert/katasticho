spring:
  application:
    name: katasticho-erp

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:katasticho}
    username: ${DB_USER:katasticho}
    password: ${DB_PASSWORD:katasticho}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  mail:
    host: ${MAIL_HOST:smtp.resend.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:resend}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# Application configuration
app:
  jwt:
    secret: ${JWT_SECRET:katasticho-dev-secret-key-change-in-production-must-be-at-least-256-bits}
    access-token-expiry-minutes: ${JWT_ACCESS_EXPIRY:15}
    refresh-token-expiry-days: ${JWT_REFRESH_EXPIRY:7}
  otp:
    expiry-minutes: 5
    max-attempts: 5
    lockout-minutes: 30
  rate-limit:
    requests-per-minute: 1000
    ai-requests-per-minute: 10
  ai:
    anthropic-api-key: ${ANTHROPIC_API_KEY:}
    model: claude-sonnet-4-20250514
    max-tokens: 4096
    max-sql-rows: 100

---
spring:
  config:
    activate:
      on-profile: dev
  jpa:
    properties:
      hibernate:
        format_sql: true
    show-sql: true

logging:
  level:
    com.katasticho.erp: DEBUG
    org.springframework.security: DEBUG

---
spring:
  config:
    activate:
      on-profile: prod

logging:
  level:
    com.katasticho.erp: INFO
    org.springframework.security: WARN
